<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Полноэкранное фото</title>
    <style>
        /* Сброс отступов – чтобы фото занимало ВЕСЬ экран */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* убираем полосы прокрутки */
        }
        /* Картинка растягивается на весь экран, сохраняя пропорции */
        .fullscreen-image {
            width: 100vw;
            height: 100vh;
            object-fit: cover;   /* обрезает края, но заполняет всё поле */
            display: block;      /* убирает лишний отступ снизу */
        }
        /* Если хотите, чтобы фото растягивалось без обрезки (искажаясь),
           замените object-fit: cover; на object-fit: fill; */
    </style>
</head>
<body>
    <!-- Укажите здесь ПУТЬ К ВАШЕМУ ФАЙЛУ -->
    <img src="photo.jpg" alt="Фото на весь экран" class="fullscreen-image" />
</body>
</html>
